<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Tools On Earth LLC</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            min-height: 100dvh;
            display: grid;
            place-items: center;
            padding: 1.5rem;
            background-color: #13141a;
            color: #e8e6e1;
            font-family: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: clamp(16px, 1rem + 0.3vw, 18px);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        main {
            max-width: min(92vw, 560px);
            text-align: center;
        }

        h1 {
            margin: 0;
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        .hairline {
            width: 40px;
            height: 1px;
            margin: 28px auto;
            background-color: #2a2b33;
            border: 0;
        }

        .description {
            margin: 0;
        }

        .contact {
            margin: 0;
            font-size: 0.95rem;
        }

        .contact a {
            color: #e8e6e1;
            text-decoration: none;
        }

        .contact a:hover {
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        .contact a:focus-visible {
            outline: 2px solid #e8e6e1;
            outline-offset: 3px;
            border-radius: 1px;
        }

        .copyright {
            margin: 32px 0 0;
            font-size: 0.8rem;
            color: #8a8a82;
        }

        .br-mobile {
            display: none;
        }

        @media (max-width: 600px) {
            .br-mobile {
                display: inline;
            }

            .br-desktop {
                display: none;
            }
        }
    </style>
</head>

<body>
    <main>
        <h1>Tools On Earth LLC</h1>
        <hr class="hairline" aria-hidden="true">
        <p class="description">An independent software company<br class="br-mobile"> building<br class="br-desktop"> simple, edifying tools<br class="br-mobile"> for people of all ages.</p>
        <hr class="hairline" aria-hidden="true">
        <p class="contact"><a href="mailto:timothy@toolsonearth.org">timothy@toolsonearth.org</a></p>
        <p class="copyright">&copy; 2026 Tools On Earth LLC.<br class="br-mobile"> All rights reserved.</p>
    </main>
</body>

</html>
